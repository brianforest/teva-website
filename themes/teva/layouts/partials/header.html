<header class="site-header">
  <div class="header-inner">
    <a href="/" class="site-logo"><img src="{{ "images/logo.png" | relURL }}" alt="TEVA 台灣電動車發展促進協會" class="logo-img"></a>
    <button class="menu-toggle" onclick="document.querySelector('.site-nav').classList.toggle('open')" aria-label="Toggle menu">&#9776;</button>
    <nav class="site-nav">
      {{ range .Site.Menus.main }}
        <a href="{{ .URL }}"{{ if $.IsMenuCurrent "main" . }} class="active"{{ end }}>{{ .Name }}</a>
      {{ end }}
    </nav>
  </div>
</header>
